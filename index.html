<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bribbbbble - Discover Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Bribbbbble</div>
        <nav>
            <a href="#">Find designers</a>
            <a href="#">Inspiration</a>
            <a href="#">Courses</a>
            <a href="#">Go Pro</a>
        </nav>
        <div class="auth-buttons">
            <a href="#" class="btn-login">Log in</a>
            <a href="#" class="btn-signup">Sign up</a>
        </div>
    </header>

    <section class="hero">
        <h1>Discover the world’s top designers & creatives</h1>
        <p>Bribbbbble is the leading destination to find & showcase creative work.</p>
        <div class="search-bar">
            <input type="text" placeholder="Search creative work...">
        </div>
    </section>

    <main class="shots-container">
        <div class="shot-card">
            <img src="https://picsum.photos/400/300?random=1" alt="Design Shot" class="shot-img">
            <div class="shot-details">
                <div class="designer-info">
                    <img src="https://picsum.photos/30/30?random=11" alt="Avatar" class="avatar">
                    <span class="designer-name">Alex Design</span>
                </div>
                <div class="shot-stats">
                    <span>❤️ 42</span>
                    <span>👁️ 1.2k</span>
                </div>
            </div>
        </div>

        <div class="shot-card">
            <img src="https://picsum.photos/400/300?random=2" alt="Design Shot" class="shot-img">
            <div class="shot-details">
                <div class="designer-info">
                    <img src="https://picsum.photos/30/30?random=12" alt="Avatar" class="avatar">
                    <span class="designer-name">Sarah K.</span>
                </div>
                <div class="shot-stats">
                    <span>❤️ 88</span>
                    <span>👁️ 2.4k</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
